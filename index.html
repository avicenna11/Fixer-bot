<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>FIXER BOT PANEL</title>
  <style>
    body { background:#111; color:#eee; font-family:Arial; padding:20px; }
    button { padding:10px 20px; margin:10px; font-size:16px; cursor:pointer; }
    input { padding:8px; margin:5px; width:100px; }
    .box { background:#222; padding:20px; margin-top:20px; border-radius:10px; }
  </style>
</head>
<body>

<h1>FIXER BOT PANEL</h1>

<div class="box">
  <h2>Bot Controls</h2>
  <button onclick="startBot()">Start Bot</button>
  <button onclick="stopBot()">Stop Bot</button>
</div>

<div class="box">
  <h2>Settings</h2>
  <label>TX/day:</label>
  <input id="tx" type="number"><br>

  <label>Min Delay (sec):</label>
  <input id="min" type="number"><br>

  <label>Max Delay (sec):</label>
  <input id="max" type="number"><br>

  <button onclick="save()">Save Settings</button>
</div>

<script>
const API_URL = "https://fixer-bot-d7sw.onrender.com";

function startBot() {
  fetch(API_URL + "/start")
    .then(r => console.log("Start sent"))
    .catch(e => console.error(e));
}

function stopBot() {
  fetch(API_URL + "/stop")
    .then(r => console.log("Stop sent"))
    .catch(e => console.error(e));
}

function save() {
  const data = {
    tx_per_day: Number(document.getElementById("tx").value),
    min_delay: Number(document.getElementById("min").value),
    max_delay: Number(document.getElementById("max").value)
  };

  fetch(API_URL + "/save", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  })
  .then(r => console.log("Settings saved"))
  .catch(e => console.error(e));
}
</script>

</body>
